<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dog Scanner</title>
<meta name="description" content="UK rescue scanner — Border Collie, Springer Spaniel and crosses">
<style>
  :root {
    --bg: #0f1115;
    --bg-card: #181b22;
    --bg-card-hover: #1f232c;
    --border: #262a33;
    --fg: #e6e8ec;
    --fg-dim: #9aa0a8;
    --accent: #7c9cff;
    --accent-dim: #5b6fb8;
    --warn: #f59e0b;
    --new: #4ade80;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 24px 16px 80px; }
  header { margin-bottom: 24px; }
  h1 { font-size: 26px; margin: 0 0 4px; font-weight: 700; }
  .sub { color: var(--fg-dim); font-size: 14px; }
  .meta {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--fg-dim);
    display: flex;
    flex-wrap: wrap;
    gap: 12px 24px;
  }
  .meta strong { color: var(--fg); font-weight: 600; }
  .group-title {
    margin: 32px 0 12px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--fg-dim);
  }
  .group-title .count {
    color: var(--accent);
    font-weight: 700;
  }
  .group:first-of-type .group-title { margin-top: 24px; }
  .dog {
    display: block;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    text-decoration: none;
    color: inherit;
    transition: background 0.12s, transform 0.12s;
  }
  .dog:hover, .dog:focus {
    background: var(--bg-card-hover);
    transform: translateY(-1px);
    outline: none;
  }
  .dog-row1 {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
  }
  .dog-name { font-weight: 600; font-size: 16px; color: var(--fg); }
  .dog-breed { color: var(--accent); font-size: 14px; }
  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge.new { background: rgba(74, 222, 128, 0.15); color: var(--new); }
  .badge.reserved { background: rgba(245, 158, 11, 0.15); color: var(--warn); }
  .dog-row2 {
    margin-top: 4px;
    color: var(--fg-dim);
    font-size: 13px;
  }
  .dot { color: var(--border); margin: 0 6px; }
  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    color: var(--fg-dim);
    font-size: 12px;
    text-align: center;
  }
  footer a { color: var(--accent-dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--fg-dim);
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 10px;
  }
  .error { color: #f87171; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🐕 Dog Scanner</h1>
    <div class="sub">UK rescues — Border Collies, Springer Spaniels & crosses</div>
    <div class="meta" id="meta">Loading…</div>
  </header>
  <main id="content"></main>
  <footer>
    Updates every 10 minutes via
    <a href="https://github.com/1cookstar2-web/dog-scanner" target="_blank" rel="noopener">GitHub Actions</a>.
  </footer>
</div>

<script>
const REPO_RAW = "https://raw.githubusercontent.com/1cookstar2-web/dog-scanner/main/state";
const REFRESH_MS = 5 * 60 * 1000;
const DAY_MS = 24 * 60 * 60 * 1000;

async function fetchJSON(path) {
  const url = `${REPO_RAW}/${path}?t=${Date.now()}`;
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`${path}: HTTP ${r.status}`);
  return r.json();
}

function fmtAge(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}

function classify(dogs) {
  const now = Date.now();
  const today = [], thisWeek = [], older = [];
  for (const d of dogs) {
    if (!d.first_seen) { older.push(d); continue; }
    const age = now - new Date(d.first_seen).getTime();
    if (age < DAY_MS) today.push(d);
    else if (age < 7 * DAY_MS) thisWeek.push(d);
    else older.push(d);
  }
  return { today, thisWeek, older };
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderDog(d, isNew) {
  const dist = d.distance_miles != null ? `${d.distance_miles} mi` : "dist unknown";
  const meta = [d.location, dist, d.source].filter(Boolean)
    .map(escape).join('<span class="dot">•</span>');
  const newBadge = isNew ? '<span class="badge new">NEW</span>' : '';
  const reservedBadge = d.reserved ? '<span class="badge reserved">RESERVED</span>' : '';
  return `
    <a class="dog" href="${escape(d.url)}" target="_blank" rel="noopener">
      <div class="dog-row1">
        <span class="dog-name">${escape(d.name || "Unnamed")}</span>
        <span class="dog-breed">${escape(d.breed || "")}</span>
        ${newBadge}
        ${reservedBadge}
      </div>
      <div class="dog-row2">${meta}</div>
    </a>
  `;
}

function renderGroup(title, dogs, markNew) {
  if (!dogs.length) return "";
  return `
    <section class="group">
      <h2 class="group-title">${title} <span class="count">${dogs.length}</span></h2>
      ${dogs.map(d => renderDog(d, markNew)).join("")}
    </section>
  `;
}

async function load() {
  const meta = document.getElementById("meta");
  const content = document.getElementById("content");
  try {
    const dogs = await fetchJSON("dogs.json");

    const { today, thisWeek, older } = classify(dogs);
    // Use the most recent first_seen as a proxy for "last scan" — the page
    // updates whenever a new dog appears, which is when it matters.
    const newest = dogs
      .map(d => d.first_seen)
      .filter(Boolean)
      .sort()
      .pop();

    meta.innerHTML = `
      <span><strong>${dogs.length}</strong> dog${dogs.length === 1 ? "" : "s"} listed</span>
      <span><strong>${today.length}</strong> new today</span>
      ${newest ? `<span>Newest: <strong>${fmtAge(newest)}</strong></span>` : ""}
    `;

    if (dogs.length === 0) {
      content.innerHTML = `<div class="empty">No matching dogs in this scan. Check back later.</div>`;
      return;
    }

    content.innerHTML =
      renderGroup("New today", today, true) +
      renderGroup("This week", thisWeek, false) +
      renderGroup("Older listings", older, false);
  } catch (e) {
    meta.innerHTML = `<span class="error">Failed to load data: ${escape(e.message)}</span>`;
    content.innerHTML = "";
    console.error(e);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
